# Stage C (Compressed): End-to-end fine-tune with RTC + FASTER — 20K steps (was 80K)
# Low LR e2e tuning; RTC/FASTER are lightweight add-on losses.

defaults:
  - ../model/v2_qwen2vl_7b_trirate_expert18

stage: c

train:
  max_steps: 20000
  warmup_steps: 1000
  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0

  sequence_window: 24
  semantic_refresh_stride: 6
  medium_update_stride: 2
  global_batch_size: 64
  per_device_batch_size: 2
  grad_accum_steps: 4

  bf16: true
  fsdp: true
  checkpointing: true

  stop_gradient_cond_prefix: true
  ema_decay: 0.9999

  rtc:
    enable: true
    execution_horizon: 8
    overlap_ratio: 0.333
    inpaint_overlap: true
    smooth_weight: 0.1
    prev_chunk_steps: 4

  faster:
    enable: true
    near_ratio: 0.3
    near_steps: 2
    far_steps: 8
    aux_loss_weight: 0.2

  loss_weights:
    fast_discrete: 1.0
    phase: 0.5
    affordance: 0.3
    consistency: 0.3
    flow_matching: 1.0
    rtc: 0.3
    faster: 0.2

  resume_from: outputs/v2_stage_b/checkpoint-latest
  eval_interval: 1000
  save_interval: 2000
  output_dir: outputs/v2_stage_c
