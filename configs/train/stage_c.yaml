# Stage C: Full fine-tune with RTC + FASTER

defaults:
  - ../model/v2_qwen2vl_7b_trirate_expert18

stage: c

train:
  max_steps: 80000
  warmup_steps: 2000
  learning_rate: 3.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0

  sequence_window: 24
  semantic_refresh_stride: 6
  medium_update_stride: 2
  global_batch_size: 64
  per_device_batch_size: 2
  grad_accum_steps: 4

  bf16: true
  fsdp: true
  checkpointing: true

  stop_gradient_cond_prefix: true
  ema_decay: 0.9999

  rtc:
    enable: true
    execution_horizon: 8
    overlap_ratio: 0.333
    inpaint_overlap: true

  faster:
    enable: true
    near_ratio: 0.3
    near_steps: 2
    far_steps: 8

  loss_weights:
    fast_discrete: 1.0
    phase: 0.5
    affordance: 0.3
    consistency: 0.3
    flow_matching: 1.0

  resume_from: outputs/v2_stage_b/checkpoint-latest
  output_dir: outputs/v2_stage_c
