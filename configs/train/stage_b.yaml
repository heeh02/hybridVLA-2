# Stage B: Add Action Expert with knowledge insulation + EMA

defaults:
  - ../model/v2_qwen2vl_7b_trirate_expert18

stage: b

train:
  max_steps: 200000
  warmup_steps: 5000
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0

  sequence_window: 24
  semantic_refresh_stride: 6
  medium_update_stride: 2
  global_batch_size: 64
  per_device_batch_size: 2
  grad_accum_steps: 4

  bf16: true
  fsdp: true
  checkpointing: true

  stop_gradient_cond_prefix: true
  block_fm_to_backbone: true
  ema_decay: 0.999

  loss_weights:
    fast_discrete: 1.0
    phase: 0.5
    affordance: 0.3
    consistency: 0.3
    flow_matching: 1.0

  resume_from: outputs/v2_stage_a/checkpoint-latest
  output_dir: outputs/v2_stage_b
