# LIBERO multi-camera data config
# Enables 3 cameras: agentview, wrist (eye_in_hand), left_view
# Official obs spec: low_dim = [joint_states(7), gripper_states(2)] = 9-dim

data:
  format: libero_hdf5
  image_key: agentview_rgb  # primary camera (fallback for single-cam)
  camera_keys:
    - agentview_rgb
    - eye_in_hand_rgb
    - left_view_rgb
  proprio_key: joint_states
  proprio_keys: [joint_states, gripper_states]
  action_key: actions
  language_key: language_instruction
  max_text_length: 1024

model:
  action_expert:
    action_dim: 7
  proprio_dim: 9   # joint_states(7) + gripper_states(2)
  multi_camera:
    enable: true
    num_cameras: 3
    camera_names: [agentview, eye_in_hand, left_view]
    fusion: concat
