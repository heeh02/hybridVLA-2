defaults:
  - ../../../configs/model/v2_qwen2vl_7b_trirate_expert18
  - ../data/libero_singlecam

stage: c

train:
  max_steps: 80000
  warmup_steps: 2000
  learning_rate: 3.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0

  sequence_window: 24
  semantic_refresh_stride: 6
  medium_update_stride: 2
  global_batch_size: 64
  per_device_batch_size: 2
  grad_accum_steps: 4

  bf16: true
  fsdp: true
  checkpointing: true

  stop_gradient_cond_prefix: true

  rtc:
    enable: false

  faster:
    enable: false

  loss_weights:
    fast_discrete: 1.0
    phase: 0.0
    affordance: 0.0
    consistency: 0.3
    flow_matching: 1.0

  log_interval: 50
  eval_interval: 2000
  save_interval: 5000

  resume_from: outputs/libero_hybrid/stage_b/checkpoint-latest
  output_dir: outputs/libero_hybrid/stage_c

