defaults:
  - ../../../configs/model/v2_qwen2vl_7b_trirate_expert18
  - ../data/libero_singlecam

stage: a

train:
  max_steps: 120000
  warmup_steps: 3000
  learning_rate: 2.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0

  sequence_window: 24
  semantic_refresh_stride: 6
  medium_update_stride: 2
  global_batch_size: 64
  per_device_batch_size: 2
  grad_accum_steps: 4

  bf16: true
  fsdp: true
  checkpointing: true

  loss_weights:
    fast_discrete: 1.0
    phase: 0.0
    affordance: 0.0
    consistency: 0.3

  log_interval: 50
  eval_interval: 2000
  save_interval: 5000
  output_dir: outputs/libero_hybrid/stage_a

